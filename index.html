<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pentru Ștefan — Vederi de acasă</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Special+Elite&family=Poppins:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --paper:#F5F1FB;
    --paper-dark:#E7DDF6;
    --accent:#7C5CBF;
    --accent-deep:#5B3E96;
    --ink:#3B2E54;
    --lilac-line:#B7A3DE;
    --rose:#C9A0D8;
    --gold:#D8B4E2;
    --cream-shadow: rgba(91,62,150,0.16);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 8%, rgba(124,92,191,0.10), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(201,160,216,0.14), transparent 45%),
      var(--paper);
    background-attachment:fixed;
    font-family:'Poppins', sans-serif;
    color:var(--ink);
    min-height:100vh;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(91,62,150,0.02) 0px, transparent 1px, transparent 2px),
      repeating-linear-gradient(90deg, rgba(91,62,150,0.02) 0px, transparent 1px, transparent 2px);
    pointer-events:none;
    z-index:0;
  }
  h1,h2,h3{font-family:'Playfair Display', serif; margin:0;}
  .stamp-font{font-family:'Special Elite', monospace; letter-spacing:0.5px;}

  nav{
    position:sticky; top:0; z-index:50;
    display:flex; justify-content:center; gap:6px; flex-wrap:wrap;
    padding:14px 10px;
    background:rgba(245,241,251,0.92);
    backdrop-filter:blur(6px);
    border-bottom:2px dashed var(--lilac-line);
  }
  nav a{
    font-family:'Special Elite', monospace;
    font-size:0.82rem;
    text-decoration:none;
    padding:8px 16px; border-radius:999px;
    color:var(--ink);
    transition:background .25s, color .25s;
    cursor:pointer;
  }
  nav a.active, nav a:hover{ background:var(--accent); color:var(--paper); }

  main{max-width:980px; margin:0 auto; padding:40px 20px 90px; position:relative; z-index:1;}
  .view{animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  .postcard{
    background:var(--paper);
    border:1px solid var(--lilac-line);
    box-shadow:0 18px 40px var(--cream-shadow);
    border-radius:6px;
    padding:38px 34px;
    position:relative;
    overflow:hidden;
  }
  .postcard::after{
    content:""; position:absolute; inset:10px;
    border:1px dashed rgba(91,62,150,0.25);
    pointer-events:none; border-radius:3px;
  }
  .postcard-grid{display:flex; gap:36px; flex-wrap:wrap;}
  .postcard-left{flex:1 1 300px;}
  .postcard-right{width:190px; text-align:right;}
  .eyebrow{
    font-family:'Special Elite', monospace;
    font-size:0.78rem; color:var(--accent-deep); text-transform:uppercase; letter-spacing:2px;
  }
  .hero-title{font-size:2.5rem; color:var(--accent-deep); margin:8px 0 14px; line-height:1.15;}
  .hero-body{font-size:1.02rem; line-height:1.65; max-width:52ch;}
  .postmark{
    width:120px; height:120px; margin-left:auto;
    border-radius:50%; border:3px solid var(--ink);
    display:flex; align-items:center; justify-content:center; text-align:center;
    font-family:'Special Elite', monospace; font-size:0.68rem; line-height:1.3;
    color:var(--ink); transform:rotate(-8deg); position:relative;
  }
  .postmark::before, .postmark::after{content:""; position:absolute; left:8px; right:8px; height:1px; background:var(--ink); opacity:0.5;}
  .postmark::before{top:30%;} .postmark::after{bottom:30%;}
  .stamp{
    width:64px; height:80px; background:var(--gold);
    margin-left:auto; margin-bottom:14px;
    display:flex; align-items:center; justify-content:center; font-size:1.7rem;
    position:relative; box-shadow:0 2px 6px rgba(0,0,0,0.15);
  }
  .stamp::before{
    content:""; position:absolute; inset:-6px;
    background-image: radial-gradient(circle, var(--paper) 3px, transparent 3.5px);
    background-size:12px 12px; background-position:-6px -6px; z-index:-1;
  }
  .route-line{margin-top:26px; display:flex; align-items:center; gap:10px; font-family:'Special Elite', monospace; font-size:0.8rem; color:var(--accent-deep);}
  .route-line .dots{flex:1; border-top:2px dotted var(--lilac-line); position:relative; height:1px;}
  .route-line .dots::after{content:"✈"; position:absolute; top:-11px; left:50%; transform:translateX(-50%); font-size:0.9rem; color:var(--accent);}

  /* HERO EMOȚIONAL */
  .hero-section{
    position:relative; min-height:64vh; border-radius:10px; overflow:hidden;
    margin-bottom:64px; display:flex; align-items:flex-end;
    box-shadow:0 20px 44px var(--cream-shadow);
  }
  .hero-bg{
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    background-color:var(--paper-dark);
    background-image:
      radial-gradient(circle at 30% 30%, rgba(124,92,191,0.25), transparent 55%),
      radial-gradient(circle at 75% 70%, rgba(201,160,216,0.3), transparent 55%);
  }
  .hero-bg-note{
    position:absolute; top:16px; left:16px; z-index:2;
    font-family:'Special Elite', monospace; font-size:0.72rem;
    color:var(--accent-deep); background:rgba(245,241,251,0.85);
    padding:6px 12px; border-radius:999px; border:1px dashed var(--lilac-line);
  }
  .hero-overlay{
    position:relative; z-index:2; width:100%;
    padding:50px 44px;
    background:linear-gradient(180deg, transparent 0%, rgba(43,31,69,0.55) 45%, rgba(43,31,69,0.88) 100%);
    color:#F5F1FB;
  }
  .hero-eyebrow{
    font-family:'Special Elite', monospace; letter-spacing:3px; text-transform:uppercase;
    font-size:0.78rem; opacity:0.9; margin-bottom:16px;
  }
  .hero-emotional-title{
    font-family:'Playfair Display', serif; font-style:italic;
    font-size:clamp(1.7rem, 4vw, 2.7rem); color:#FFFFFF; margin-bottom:16px; line-height:1.3;
  }
  .hero-emotional-text{ max-width:62ch; line-height:1.75; font-size:1.02rem; color:#EDE6F7; }

  /* RÂND LUNI (preview scroll) */
  .home-section{ margin-bottom:64px; }
  .months-scroll{
    display:flex; gap:18px; overflow-x:auto; padding:6px 2px 16px;
    scroll-snap-type:x mandatory;
  }
  .month-scroll-card{
    flex:0 0 170px; scroll-snap-align:start; text-decoration:none; color:inherit;
    transition:transform .2s;
  }
  .month-scroll-card:hover{ transform:translateY(-4px); }

  /* CARUSEL POEZII */
  .poem-carousel{ display:flex; align-items:center; gap:14px; }
  .carousel-track{
    display:flex; gap:20px; overflow-x:auto; scroll-behavior:smooth;
    padding:6px 2px 16px; flex:1;
  }
  .carousel-card{ flex:0 0 210px; }
  .carousel-btn{
    background:var(--accent); color:var(--paper); border:none;
    width:42px; height:42px; border-radius:50%; font-size:1.3rem; cursor:pointer;
    flex-shrink:0; transition:background .2s;
  }
  .carousel-btn:hover{ background:var(--accent-deep); }

  /* PIXEL WELCOME GATE — acum acoperă tot ecranul */
  #pixelGateWrap{
    position:fixed; inset:0; z-index:200;
    display:flex; align-items:center; justify-content:center;
  }
  .pixel-gate{
    width:100%; height:100%;
    background: linear-gradient(160deg, #2A1F45 0%, #3B2E6B 55%, #4E3A8C 100%);
    border:none;
    box-shadow:none;
    border-radius:0;
    padding:40px 30px;
    text-align:center;
    position:relative;
    overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    image-rendering:pixelated;
  }
  .pixel-gate::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, transparent 3px, transparent 6px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, transparent 3px, transparent 6px);
    pointer-events:none;
  }
  .pixel-hearts{
    font-family:'Press Start 2P', monospace;
    font-size:1.4rem;
    letter-spacing:8px;
    color:#E8A6D0;
    margin-bottom:22px;
    animation: pixelBlink 1.6s steps(2) infinite;
  }
  @keyframes pixelBlink{ 0%,100%{opacity:1;} 50%{opacity:0.55;} }
  .pixel-title{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(2.2rem, 6vw, 4.2rem);
    color:#F5F1FB;
    text-shadow: 4px 4px 0 var(--accent-deep);
    margin-bottom:28px;
    line-height:1.6;
  }
  .pixel-question{
    font-family:'Press Start 2P', monospace;
    font-size:0.72rem;
    color:#E4D9F5;
    line-height:2;
    max-width:38ch;
    margin:0 auto 34px;
  }
  .pixel-btn-row{
    position:relative;
    display:flex; justify-content:center; gap:24px;
    height:70px;
  }
  .pixel-btn{
    font-family:'Press Start 2P', monospace;
    font-size:0.85rem;
    padding:16px 28px;
    background:#D9D2E8;
    color:#2A1F45;
    border:none;
    border-top:3px solid #FFFFFF;
    border-left:3px solid #FFFFFF;
    border-right:3px solid #6B5A94;
    border-bottom:3px solid #6B5A94;
    cursor:pointer;
    transition: transform .15s, left .18s ease, top .18s ease;
  }
  .pixel-btn:active{ transform:translateY(2px); }
  #pixelNo{ position:relative; }
  .pixel-gate-sub{
    margin-top:26px; font-family:'Special Elite', monospace; font-size:0.72rem; color:#C9B8EA;
  }

  h2.section-title{font-size:1.8rem; color:var(--accent-deep); margin-bottom:6px;}
  .section-sub{font-family:'Special Elite', monospace; font-size:0.85rem; color:var(--accent); margin-bottom:26px;}
  .back-link{
    display:inline-block; margin-bottom:20px; font-family:'Special Elite', monospace;
    font-size:0.82rem; color:var(--accent-deep); text-decoration:none; cursor:pointer;
  }
  .back-link:hover{text-decoration:underline;}

 .card-grid{display:grid; grid-template-columns:repeat(auto-fill, 210px); justify-content:start; gap:26px;}
  .card{
    background:var(--paper); border:1px solid var(--lilac-line);
    box-shadow:0 10px 24px var(--cream-shadow); padding:16px; border-radius:4px;
    transition:transform .25s; cursor:pointer; text-decoration:none; color:inherit; display:block;
  }
  .card:hover{transform:translateY(-5px) rotate(-0.5deg);}
  .photo-slot{
    width:100%; aspect-ratio:4/5; border:2px dashed var(--lilac-line);
    background:var(--paper-dark); display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--accent); font-size:0.78rem; text-align:center; gap:8px; padding:10px;
    border-radius:3px; background-size:cover; background-position:center;
  }
  .photo-slot.small{aspect-ratio:1;}
  .photo-slot span.icon{font-size:1.6rem;}
  .card-label{font-family:'Special Elite', monospace; color:var(--accent-deep); font-size:0.95rem; margin-top:12px;}
  .card-caption{font-size:0.85rem; color:var(--ink); opacity:0.8; margin-top:4px; font-style:italic;}

  .poem-photo{width:100%; max-width:320px; border-radius:6px; border:1px solid var(--lilac-line); margin-bottom:20px;}
  .poem-text{
    font-family:'Playfair Display', serif; font-size:1.15rem; line-height:2; white-space:pre-line;
    background:var(--paper); border:1px solid var(--lilac-line); border-radius:6px; padding:30px;
    box-shadow:0 10px 24px var(--cream-shadow); font-style:italic; color:var(--ink);
  }
  .photo-gallery{display:grid; grid-template-columns:repeat(auto-fill, 150px); justify-content:start; gap:16px; margin-top:10px;}
  .gallery-item{background:var(--paper); border:1px solid var(--lilac-line); border-radius:8px; padding:8px; box-shadow:0 8px 18px var(--cream-shadow); width:150px;}

  .upload-photo-form{
    margin-top:26px; display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    background:var(--paper); border:1px dashed var(--lilac-line); border-radius:6px; padding:18px;
  }
  .upload-photo-form input[type="text"]{
    flex:1; min-width:180px; font-family:'Poppins', sans-serif; border:1.5px solid var(--lilac-line);
    border-radius:6px; padding:10px; font-size:0.9rem; background:var(--paper-dark);
  }
  .upload-photo-form input[type="file"]{ font-family:'Poppins', sans-serif; font-size:0.85rem; }
  .upload-photo-form button{
    font-family:'Special Elite', monospace; background:var(--accent); color:var(--paper);
    border:none; padding:10px 22px; border-radius:999px; cursor:pointer;
  }
  .upload-photo-form button:hover{ background:var(--accent-deep); }
.upload-status{ width:100%; font-size:0.82rem; color:var(--accent-deep); font-style:italic; }

  .lightbox{
    display:none; position:fixed; inset:0; z-index:300;
    background:rgba(20,14,35,0.92);
    align-items:center; justify-content:center; padding:30px;
  }
  .lightbox.show{ display:flex; }
  .lightbox img{
    max-width:90vw; max-height:90vh; border-radius:8px;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  .lightbox-close{
    position:absolute; top:24px; right:28px; background:none; border:none;
    color:#F5F1FB; font-size:1.6rem; cursor:pointer;
  }
  .photo-slot{ cursor:pointer; }

  .comments-box{margin-top:30px;}
  .comment-list{display:flex; flex-direction:column; gap:12px; margin-bottom:18px;}
  .comment-item{
    background:var(--paper-dark); border-left:3px solid var(--accent); border-radius:4px;
    padding:12px 16px; font-size:0.92rem;
  }
 .comment-item .c-meta{font-family:'Special Elite', monospace; font-size:0.72rem; color:var(--accent-deep); margin-bottom:4px;}
  .delete-btn{
    display:block; margin-top:8px; font-family:'Special Elite', monospace; font-size:0.72rem;
    background:none; border:none; color:#B0517A; cursor:pointer; padding:0; opacity:0.7;
  }
  .delete-btn:hover{ opacity:1; text-decoration:underline; }
  .comment-form textarea, .comment-form input{
    width:100%; font-family:'Poppins', sans-serif; border:1.5px solid var(--lilac-line);
    border-radius:6px; padding:10px; font-size:0.9rem; margin-bottom:10px; background:var(--paper);
  }
  .comment-form button{
    font-family:'Special Elite', monospace; background:var(--accent); color:var(--paper);
    border:none; padding:10px 24px; border-radius:999px; cursor:pointer;
  }
  .comment-form button:hover{background:var(--accent-deep);}
  .empty-note{font-size:0.85rem; opacity:0.6; font-style:italic;}

  .games-grid{display:grid; gap:34px;}
  .game-card{background:var(--paper); border:1px solid var(--lilac-line); box-shadow:0 12px 26px var(--cream-shadow); border-radius:6px; padding:28px;}
  .game-title{font-size:1.35rem; color:var(--ink); margin-bottom:4px;}
  .game-sub{font-family:'Special Elite', monospace; font-size:0.78rem; color:var(--accent); margin-bottom:18px;}

  .memory-grid{display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; max-width:420px; margin:0 auto;}
  .mem-card{aspect-ratio:1; perspective:600px; cursor:pointer;}
  .mem-inner{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d;}
  .mem-card.flip .mem-inner{transform:rotateY(180deg);}
  .mem-face{position:absolute; inset:0; backface-visibility:hidden; display:flex; align-items:center; justify-content:center; border-radius:6px; font-size:1.5rem;}
  .mem-front{background:var(--ink); color:var(--gold);}
  .mem-back{background:var(--paper-dark); border:1px solid var(--lilac-line); transform:rotateY(180deg);}
  .mem-card.matched .mem-back{background:#e6dcf3; border-color:var(--accent);}
  .mem-status{text-align:center; margin-top:14px; font-family:'Special Elite', monospace; color:var(--accent-deep); min-height:1.2em;}

  .wheel-wrap{display:flex; flex-direction:column; align-items:center; gap:18px;}
  .wheel-frame{position:relative; width:260px; height:260px;}
  .wheel{width:100%; height:100%; border-radius:50%; border:4px solid var(--ink); transition:transform 3.5s cubic-bezier(.17,.67,.32,1.02); box-shadow:0 8px 20px var(--cream-shadow);}
  .wheel-pointer{position:absolute; top:-14px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:12px solid transparent; border-right:12px solid transparent; border-top:20px solid var(--accent-deep); z-index:5;}
  .spin-btn{font-family:'Special Elite', monospace; background:var(--accent); color:var(--paper); border:none; padding:12px 30px; border-radius:999px; font-size:0.95rem; cursor:pointer; transition:transform .2s, background .2s;}
  .spin-btn:hover{background:var(--accent-deep); transform:translateY(-2px);}
  .wheel-result{font-family:'Playfair Display', serif; font-style:italic; font-size:1.1rem; color:var(--accent-deep); text-align:center; min-height:1.4em;}

  .form-q{margin-bottom:20px;}
  .form-q p{font-weight:600; margin-bottom:8px;}
  .form-opts{display:flex; flex-wrap:wrap; gap:8px;}
  .form-opts button{font-family:'Poppins', sans-serif; border:1.5px solid var(--lilac-line); background:var(--paper-dark); padding:8px 14px; border-radius:999px; cursor:pointer; font-size:0.85rem; transition:.2s;}
  .form-opts button.picked{background:var(--accent); color:var(--paper); border-color:var(--accent);}
  .submit-btn{font-family:'Special Elite', monospace; background:var(--ink); color:var(--paper); border:none; padding:12px 28px; border-radius:999px; cursor:pointer; margin-top:6px;}
  .submit-btn:hover{background:var(--accent-deep);}
  .approved{margin-top:22px; text-align:center; padding:22px; border:3px solid var(--accent-deep); border-radius:8px; transform:rotate(-2deg); display:none;}
  .approved.show{display:block; animation:stampIn .4s ease;}
  @keyframes stampIn{from{opacity:0; transform:scale(1.4) rotate(-2deg);} to{opacity:1; transform:scale(1) rotate(-2deg);}}
  .approved h3{color:var(--accent-deep); font-family:'Special Elite', monospace; font-size:1.4rem; letter-spacing:2px;}

  footer{text-align:center; padding:26px; font-family:'Special Elite', monospace; font-size:0.75rem; color:var(--accent);}

  .music-toggle{
    position:fixed; bottom:22px; right:22px; z-index:60;
    width:54px; height:54px; border-radius:50%;
    background:var(--accent); color:var(--paper);
    border:none; font-size:1.3rem; cursor:pointer;
    box-shadow:0 8px 20px var(--cream-shadow);
    display:flex; align-items:center; justify-content:center;
    transition:background .2s, transform .2s;
  }
  .music-toggle:hover{background:var(--accent-deep); transform:scale(1.06);}
  .music-toggle.playing{animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 8px 20px var(--cream-shadow);}50%{box-shadow:0 8px 28px rgba(124,92,191,0.45);}}

  @media (max-width:600px){
    .hero-title{font-size:1.9rem;}
    .postcard-right{width:100%; text-align:left;}
    .postmark{margin:0 0 12px;} .stamp{margin:0 0 12px;}
  }
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>

<nav id="mainNav"></nav>
<main id="app"></main>
<footer>— făcut cu drag, pentru drumul spre casă —</footer>

<button class="music-toggle" id="musicToggle" title="Muzică de fundal">🎵</button>
<!--
  ADAUGĂ AICI MUZICA VOASTRĂ:
  Pune fișierul mp3 lângă acest fișier html (ex: muzica.mp3) și schimbă src-ul de mai jos,
  sau pune direct un link către un mp3 liber de drepturi de autor.
-->
<audio id="bgAudio" loop preload="none" src="muzica.mp3"></audio>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>
  
<script>
/* ============ FIREBASE + IMGBB ============ */
const firebaseConfig = {
  apiKey: "AIzaSyAK_k5Ix2i0mR9rcQzmU41AFqCJDf7WksQ",
  authDomain: "stefan-si-dan.firebaseapp.com",
  projectId: "stefan-si-dan",
  storageBucket: "stefan-si-dan.firebasestorage.app",
  messagingSenderId: "300467677659",
  appId: "1:300467677659:web:d7c44fda55f1606029dffe"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const IMGBB_KEY = "8eee43d5919b01ec061e0a6d5ae04fd4";

/* ============ DATE — completează aici cu conținutul vostru ============ */

/* Lunile relației voastre, începând din Septembrie 2025.
   PROIECT DE VIITOR: ca să adaugi Anul 2 (sau mai mulți ani), pur și simplu
   adaugi un obiect nou în albumYears, cu id și startYear diferite —
   toate cele 12 luni ale acelui an se generează automat mai jos. */
const monthNames = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];

const albumYears = [
  { id:'an-1', label:'Anul 1', startYear:2026 }
];

/* ============ COMENTARII (Firestore) ============ */
async function loadComments(poemId){
  const snapshot = await db.collection('comments').where('poemId','==',poemId).get();
  const comments = snapshot.docs.map(d=>({ id:d.id, ...d.data() }));
  comments.sort((a,b)=>a.timestamp - b.timestamp);
  return comments;
}
async function saveComment(poemId, comment){
  await db.collection('comments').add({ poemId, ...comment, timestamp: Date.now() });
}
async function deleteComment(id){
  await db.collection('comments').doc(id).delete();
}
/* ============ POZE (ImgBB + Firestore) ============ */
async function uploadPhotoToImgBB(file){
  const formData = new FormData();
  formData.append('image', file);
  const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body: formData });
  const data = await res.json();
  if(!data.success) throw new Error('upload failed');
  return data.data.url;
}
async function loadMonthPhotos(monthId){
  const snapshot = await db.collection('photos').where('monthId','==',monthId).get();
  const photos = snapshot.docs.map(d=>({ id:d.id, ...d.data() }));
  photos.sort((a,b)=>a.timestamp - b.timestamp);
  return photos;
}
async function saveMonthPhoto(monthId, url, caption){
  await db.collection('photos').add({ monthId, url, caption, timestamp: Date.now() });
}
async function deleteMonthPhoto(id){
  await db.collection('photos').doc(id).delete();
}
async function loadFirstMonthPhoto(monthId){
  const photos = await loadMonthPhotos(monthId);
  return photos.length ? photos[0].url : null;
}
async function applyFirstPhotoThumbnails(containerEl){
  if(!containerEl) return;
  const cards = containerEl.querySelectorAll('[data-monthid]');
  for(const card of cards){
    const monthId = card.dataset.monthid;
    try{
      const url = await loadFirstMonthPhoto(monthId);
      if(url){
        const slot = card.querySelector('.photo-slot');
        slot.style.backgroundImage = `url('${url}')`;
        slot.innerHTML = '';
      }
    }catch(e){}
  }
}

/* ============ ROUTER ============ */
const routes = [
  { path:'', label:'Acasă' },
  { path:'amintiri', label:'Amintiri' },
  { path:'poezii', label:'Poezii' },
  { path:'jocuri', label:'Joculețe' }
];

function renderNav(current){
  const nav = document.getElementById('mainNav');
  nav.innerHTML = routes.map(r=>
    `<a href="#/${r.path}" class="${current===r.path?'active':''}">${r.label}</a>`
  ).join('');
}

async function router(){
  const hash = location.hash.replace(/^#\/?/, '');
  const parts = hash.split('/').filter(Boolean);
  const app = document.getElementById('app');
  app.innerHTML = '<div class="view"></div>';
  const view = app.querySelector('.view');

  if(parts.length === 0){
    renderNav('');
    view.innerHTML = viewAcasa();
    initAcasaGate();
  } else if(parts[0] === 'amintiri' && parts.length === 3){
    renderNav('amintiri');
    view.innerHTML = viewLunaDetail(parts[1], parts[2]);
    initMonthPhotos(parts[2]);
  } else if(parts[0] === 'amintiri' && parts.length === 2){
    renderNav('amintiri');
    view.innerHTML = viewAnDetail(parts[1]);
    applyFirstPhotoThumbnails(view);
  } else if(parts[0] === 'amintiri'){
    renderNav('amintiri');
    view.innerHTML = viewAniList();
  } else if(parts[0] === 'poezii' && parts[1]){
    renderNav('poezii');
    view.innerHTML = viewPoemDetail(parts[1]);
    await initComments(parts[1]);
  } else if(parts[0] === 'poezii'){
    renderNav('poezii');
    view.innerHTML = viewPoezii();
  } else if(parts[0] === 'jocuri'){
    renderNav('jocuri');
    view.innerHTML = viewJocuri();
    initGames();
  } else {
    renderNav('');
    view.innerHTML = viewAcasa();
    initAcasaGate();
  }
}
  
window.addEventListener('hashchange', router);
window.addEventListener('DOMContentLoaded', router);

// Navigare robustă: interceptăm clicurile pe linkurile interne (#/...)
// ca să funcționeze corect chiar dacă mediul de previzualizare
// nu declanșează implicit "hashchange".
document.addEventListener('click', function(e){
  const a = e.target.closest('a[href^="#/"], a[href="#/"]');
  if(!a) return;
  e.preventDefault();
  const targetHash = a.getAttribute('href');
  if(location.hash === targetHash){
    router();
  } else {
    location.hash = targetHash;
  }
});

function initAcasaGate(){
  const gateWrap = document.getElementById('pixelGateWrap');
  const content = document.getElementById('acasaContent');
  const yesBtn = document.getElementById('pixelYes');
  const noBtn = document.getElementById('pixelNo');
  if(!yesBtn) return;

  let dodgeCount = 0;
  const noMessages = [
    'heeei, ce faci?!?!?!?!',
    'degeaba incerci ;)))',
    'iibituleeee, nu e voie, caca'
  ];
  noBtn.addEventListener('mouseenter', ()=>{
    dodgeCount++;
    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;
    const margin = 20;
    const maxX = window.innerWidth - btnW - margin*2;
    const maxY = window.innerHeight - btnH - margin*2;
    const randX = margin + Math.floor(Math.random()*maxX);
    const randY = margin + Math.floor(Math.random()*maxY);
    noBtn.style.position = 'fixed';
    noBtn.style.left = randX+'px';
    noBtn.style.top = randY+'px';
    noBtn.style.zIndex = '210';

    if(dodgeCount === 3){ noBtn.textContent = noMessages[0]; noBtn.style.fontSize = '0.65rem'; }
    else if(dodgeCount === 6){ noBtn.textContent = noMessages[1]; noBtn.style.fontSize = '0.65rem'; }
    else if(dodgeCount >= 9){ noBtn.textContent = noMessages[2]; noBtn.style.fontSize = '0.6rem'; }
  });

  yesBtn.addEventListener('click', ()=>{
    gateWrap.style.transition = 'opacity .4s';
    gateWrap.style.opacity = '0';
    setTimeout(()=>{
      gateWrap.style.display = 'none';
      content.style.display = 'block';
      initHomeContent();
    }, 400);
  });
}

async function initMonthPhotos(monthId){
  const galleryDiv = document.getElementById('dynamicGallery');
  const form = document.getElementById('uploadPhotoForm');
  const fileInput = document.getElementById('uploadPhotoFile');
  const captionInput = document.getElementById('uploadPhotoCaption');
  const statusEl = document.getElementById('uploadStatus');
  if(!galleryDiv || !form) return;

async function refreshGallery(){
    const photos = await loadMonthPhotos(monthId);
    galleryDiv.innerHTML = photos.length
      ? photos.map(p=>`
        <div class="gallery-item">
          <div class="photo-slot small" style="background-image:url('${p.url}')" data-url="${p.url}"></div>
          <div class="card-caption">${p.caption || ''}</div>
          <button class="delete-btn" data-id="${p.id}">🗑️ șterge</button>
        </div>`).join('')
      : '<p class="empty-note">Nicio poză adăugată încă aici — fiți primii.</p>';

    galleryDiv.querySelectorAll('.photo-slot').forEach(slot=>{
      slot.addEventListener('click', ()=>{
        document.getElementById('lightboxImg').src = slot.dataset.url;
        document.getElementById('lightbox').classList.add('show');
      });
    });

    galleryDiv.querySelectorAll('.delete-btn').forEach(btn=>{
      btn.addEventListener('click', async (e)=>{
        e.stopPropagation();
        if(!confirm('Sigur vrei să ștergi această poză?')) return;
        try{
          await deleteMonthPhoto(btn.dataset.id);
          await refreshGallery();
        }catch(err){
          alert('Eroare la ștergere: ' + err.message);
        }
      });
    });
  }

  form.addEventListener('submit', async (e)=>{
    e.preventDefault();
    if(!fileInput.files[0]) return;
    statusEl.textContent = 'Se încarcă poza...';
    try{
      const url = await uploadPhotoToImgBB(fileInput.files[0]);
      await saveMonthPhoto(monthId, url, captionInput.value.trim());
      fileInput.value = '';
      captionInput.value = '';
      statusEl.textContent = 'Poza a fost adăugată! 💜';
      refreshGallery();
    }catch(err){
      statusEl.textContent = 'A apărut o eroare, încearcă din nou.';
    }
  });

  refreshGallery();
}

async function initComments(poemId){

    const comments = await loadComments(poemId);

      ? comments.map(c=>`
        <div class="comment-item">
          <div class="c-meta">${c.name} · ${c.date}</div>

          <button class="delete-btn" data-id="${c.id}">🗑️ șterge</button>
        </div>`).join('')
      : '<p class="empty-note">Niciun comentariu încă — fii primul.</p>';

    list.querySelectorAll('.delete-btn').forEach(delBtn=>{
      delBtn.addEventListener('click', async ()=>{
        if(!confirm('Sigur vrei să ștergi acest comentariu?')) return;
        await deleteComment(delBtn.dataset.id);
        refresh();
      });
    });
  }
  btn.addEventListener('click', async ()=>{
    const name = document.getElementById('commentName').value.trim() || 'Anonim';
    const text = document.getElementById('commentText').value.trim();
    if(!text) return;
    const date = new Date().toLocaleDateString('ro-RO');
    await saveComment(poemId, { name, text, date });
    document.getElementById('commentText').value = '';
    refresh();
  });
  refresh();
}

function initGames(){
  const icons = ['✈️','💌','💜','⭐','🌍','🎵'];
  let cards = [...icons, ...icons];
  cards.sort(()=>Math.random()-0.5);
  const memoryGrid = document.getElementById('memoryGrid');
  const memStatus = document.getElementById('memStatus');
  let flippedCards = [], lockBoard = false, matchesFound = 0;

  cards.forEach(icon=>{
    const card = document.createElement('div');
    card.className = 'mem-card';
    card.innerHTML = `<div class="mem-inner"><div class="mem-face mem-front"></div><div class="mem-face mem-back">${icon}</div></div>`;
    card.dataset.icon = icon;
    card.addEventListener('click', ()=>flipCard(card));
    memoryGrid.appendChild(card);
  });
  function flipCard(card){
    if(lockBoard || card.classList.contains('flip') || card.classList.contains('matched')) return;
    card.classList.add('flip');
    flippedCards.push(card);
    if(flippedCards.length === 2){
      lockBoard = true;
      const [a,b] = flippedCards;
      if(a.dataset.icon === b.dataset.icon){
        a.classList.add('matched'); b.classList.add('matched');
        matchesFound++; flippedCards = []; lockBoard = false;
        if(matchesFound === icons.length) memStatus.textContent = 'Ai găsit toate perechile! Exact ca noi doi 💜';
      } else {
        setTimeout(()=>{ a.classList.remove('flip'); b.classList.remove('flip'); flippedCards = []; lockBoard = false; }, 800);
      }
    }
  }

  const wheelOptions = ['Maraton de filme toată noaptea','Cinăm la restaurantul vostru preferat','Album foto cu toate amintirile','O drumeție de weekend','Gătim împreună o rețetă nouă','O zi liberă doar a voastră'];
  const wheelColors = ['#7C5CBF','#5B3E96','#C9A0D8','#8B6BB5','#B99BD8','#4E3A73'];
  const wheelSvg = document.getElementById('wheelSvg');
  const segAngle = 360 / wheelOptions.length;
  function polarToCartesian(cx, cy, r, angleDeg){ const a=(angleDeg-90)*Math.PI/180; return {x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)}; }
  function describeArc(cx, cy, r, startAngle, endAngle){
    const start = polarToCartesian(cx,cy,r,endAngle), end = polarToCartesian(cx,cy,r,startAngle);
    const largeArcFlag = endAngle-startAngle<=180?"0":"1";
    return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArcFlag} 0 ${end.x} ${end.y} Z`;
  }
  wheelOptions.forEach((opt,i)=>{
    const start=i*segAngle, end=start+segAngle;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', describeArc(100,100,98,start,end));
    path.setAttribute('fill', wheelColors[i%wheelColors.length]);
    wheelSvg.appendChild(path);
    const mid=start+segAngle/2, labelPos=polarToCartesian(100,100,62,mid);
    const text=document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x',labelPos.x); text.setAttribute('y',labelPos.y);
    text.setAttribute('fill','#F5F1FB'); text.setAttribute('font-size','7');
    text.setAttribute('font-family','Poppins, sans-serif'); text.setAttribute('text-anchor','middle');
    text.setAttribute('transform', `rotate(${mid}, ${labelPos.x}, ${labelPos.y})`);
    const words=opt.split(' '); let line='', lines=[];
    words.forEach(w=>{ if((line+w).length>14){lines.push(line); line=w+' ';} else line+=w+' '; });
    lines.push(line);
    lines.forEach((l,idx)=>{
      const tspan=document.createElementNS('http://www.w3.org/2000/svg','tspan');
      tspan.setAttribute('x', labelPos.x); tspan.setAttribute('dy', idx===0?0:8);
      tspan.textContent=l.trim(); text.appendChild(tspan);
    });
    wheelSvg.appendChild(text);
  });
  let currentRotation=0;
  document.getElementById('spinBtn').addEventListener('click', ()=>{
    const winnerIndex=Math.floor(Math.random()*wheelOptions.length);
    const targetMid=winnerIndex*segAngle+segAngle/2;
    const spins=5*360;
    const finalRotation=currentRotation+spins+(360-targetMid)-(currentRotation%360);
    currentRotation=finalRotation;
    document.getElementById('wheelSvg').style.transform=`rotate(${finalRotation}deg)`;
    document.getElementById('wheelResult').textContent='';
    setTimeout(()=>{ document.getElementById('wheelResult').textContent='→ '+wheelOptions[winnerIndex]; }, 3600);
  });

  const questions = [
    { q:'Câte kilograme de dor declari la intrare?', opts:['0-5 kg','10 kg','Prea mult ca să încapă în bagaj'] },
    { q:'Motivul vizitei?', opts:['Turism','Afaceri','Să stau cu tine pentru totdeauna'] },
    { q:'Ai ceva de declarat?', opts:['Nimic','Câteva îmbrățișări restante','O inimă întreagă, doar pentru tine'] },
    { q:'Durata șederii preconizate?', opts:['Un weekend','Cât ține concediul','Pe viață'] }
  ];
  const customsForm = document.getElementById('customsForm');
  questions.forEach((item,qi)=>{
    const div=document.createElement('div'); div.className='form-q';
    div.innerHTML = `<p>${qi+1}. ${item.q}</p><div class="form-opts">${item.opts.map((o,oi)=>`<button data-q="${qi}" data-o="${oi}">${o}</button>`).join('')}</div>`;
    customsForm.appendChild(div);
  });
  customsForm.addEventListener('click', e=>{
    if(e.target.tagName==='BUTTON'){
      const qi=e.target.dataset.q;
      document.querySelectorAll(`button[data-q="${qi}"]`).forEach(b=>b.classList.remove('picked'));
      e.target.classList.add('picked');
    }
  });
  const submitBtn=document.createElement('button');
  submitBtn.className='submit-btn'; submitBtn.textContent='Depune formularul';
  customsForm.appendChild(submitBtn);
  submitBtn.addEventListener('click', ()=>{ document.getElementById('approvedStamp').classList.add('show'); });
}

/* ============ LIGHTBOX ============ */
document.getElementById('lightboxClose').addEventListener('click', ()=>{
  document.getElementById('lightbox').classList.remove('show');
});
document.getElementById('lightbox').addEventListener('click', (e)=>{
  if(e.target.id === 'lightbox') document.getElementById('lightbox').classList.remove('show');
});

/* ============ MUSIC TOGGLE ============ */
const musicBtn = document.getElementById('musicToggle');
const bgAudio = document.getElementById('bgAudio');
let playing = false;
musicBtn.addEventListener('click', ()=>{
  if(!playing){
    bgAudio.play().catch(()=>{});
    musicBtn.classList.add('playing');
    musicBtn.textContent = '🔊';
    playing = true;
  } else {
    bgAudio.pause();
    musicBtn.classList.remove('playing');
    musicBtn.textContent = '🎵';
    playing = false;
  }
});
</script>
