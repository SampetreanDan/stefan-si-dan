<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pentru stefan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Special+Elite&family=Poppins:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --paper:#F5F1FB;
    --paper-dark:#E7DDF6;
    --accent:#7C5CBF;
    --accent-deep:#5B3E96;
    --ink:#3B2E54;
    --lilac-line:#B7A3DE;
    --rose:#C9A0D8;
    --gold:#D8B4E2;
    --cream-shadow: rgba(91,62,150,0.16);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 8%, rgba(124,92,191,0.10), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(201,160,216,0.14), transparent 45%),
      var(--paper);
    background-attachment:fixed;
    font-family:'Poppins', sans-serif;
    color:var(--ink);
    min-height:100vh;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(91,62,150,0.02) 0px, transparent 1px, transparent 2px),
      repeating-linear-gradient(90deg, rgba(91,62,150,0.02) 0px, transparent 1px, transparent 2px);
    pointer-events:none;
    z-index:0;
  }
  h1,h2,h3{font-family:'Playfair Display', serif; margin:0;}
  .stamp-font{font-family:'Special Elite', monospace; letter-spacing:0.5px;}

  nav{
    position:sticky; top:0; z-index:50;
    display:flex; justify-content:center; gap:6px; flex-wrap:wrap;
    padding:14px 10px;
    background:rgba(245,241,251,0.92);
    backdrop-filter:blur(6px);
    border-bottom:2px dashed var(--lilac-line);
  }
  nav a{
    font-family:'Special Elite', monospace;
    font-size:0.82rem;
    text-decoration:none;
    padding:8px 16px; border-radius:999px;
    color:var(--ink);
    transition:background .25s, color .25s;
    cursor:pointer;
  }
  nav a.active, nav a:hover{ background:var(--accent); color:var(--paper); }

  main{max-width:980px; margin:0 auto; padding:40px 20px 90px; position:relative; z-index:1;}
  .view{animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  .postcard{
    background:var(--paper);
    border:1px solid var(--lilac-line);
    box-shadow:0 18px 40px var(--cream-shadow);
    border-radius:6px;
    padding:38px 34px;
    position:relative;
    overflow:hidden;
  }
  .postcard::after{
    content:""; position:absolute; inset:10px;
    border:1px dashed rgba(91,62,150,0.25);
    pointer-events:none; border-radius:3px;
  }
  .postcard-grid{display:flex; gap:36px; flex-wrap:wrap;}
  .postcard-left{flex:1 1 300px;}
  .postcard-right{width:190px; text-align:right;}
  .eyebrow{
    font-family:'Special Elite', monospace;
    font-size:0.78rem; color:var(--accent-deep); text-transform:uppercase; letter-spacing:2px;
  }
  .hero-title{font-size:2.5rem; color:var(--accent-deep); margin:8px 0 14px; line-height:1.15;}
  .hero-body{font-size:1.02rem; line-height:1.65; max-width:52ch;}
  .postmark{
    width:120px; height:120px; margin-left:auto;
    border-radius:50%; border:3px solid var(--ink);
    display:flex; align-items:center; justify-content:center; text-align:center;
    font-family:'Special Elite', monospace; font-size:0.68rem; line-height:1.3;
    color:var(--ink); transform:rotate(-8deg); position:relative;
  }
  .postmark::before, .postmark::after{content:""; position:absolute; left:8px; right:8px; height:1px; background:var(--ink); opacity:0.5;}
  .postmark::before{top:30%;} .postmark::after{bottom:30%;}
  .stamp{
    width:64px; height:80px; background:var(--gold);
    margin-left:auto; margin-bottom:14px;
    display:flex; align-items:center; justify-content:center; font-size:1.7rem;
    position:relative; box-shadow:0 2px 6px rgba(0,0,0,0.15);
  }
  .stamp::before{
    content:""; position:absolute; inset:-6px;
    background-image: radial-gradient(circle, var(--paper) 3px, transparent 3.5px);
    background-size:12px 12px; background-position:-6px -6px; z-index:-1;
  }
  .route-line{margin-top:26px; display:flex; align-items:center; gap:10px; font-family:'Special Elite', monospace; font-size:0.8rem; color:var(--accent-deep);}
  .route-line .dots{flex:1; border-top:2px dotted var(--lilac-line); position:relative; height:1px;}
  .route-line .dots::after{content:"✈"; position:absolute; top:-11px; left:50%; transform:translateX(-50%); font-size:0.9rem; color:var(--accent);}

  /* HERO EMOȚIONAL */
  .hero-section{
    position:relative; min-height:64vh; border-radius:10px; overflow:hidden;
    margin-bottom:64px; display:flex; align-items:flex-end;
    box-shadow:0 20px 44px var(--cream-shadow);
  }
  .hero-bg{
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    background-color:var(--paper-dark);
    background-image:
      radial-gradient(circle at 30% 30%, rgba(124,92,191,0.25), transparent 55%),
      radial-gradient(circle at 75% 70%, rgba(201,160,216,0.3), transparent 55%);
  }
  .hero-bg-note{
    position:absolute; top:16px; left:16px; z-index:2;
    font-family:'Special Elite', monospace; font-size:0.72rem;
    color:var(--accent-deep); background:rgba(245,241,251,0.85);
    padding:6px 12px; border-radius:999px; border:1px dashed var(--lilac-line);
  }
  .hero-overlay{
    position:relative; z-index:2; width:100%;
    padding:50px 44px;
    background:linear-gradient(180deg, transparent 0%, rgba(43,31,69,0.55) 45%, rgba(43,31,69,0.88) 100%);
    color:#F5F1FB;
  }
  .hero-eyebrow{
    font-family:'Special Elite', monospace; letter-spacing:3px; text-transform:uppercase;
    font-size:0.78rem; opacity:0.9; margin-bottom:16px;
  }
  .hero-emotional-title{
    font-family:'Playfair Display', serif; font-style:italic;
    font-size:clamp(1.7rem, 4vw, 2.7rem); color:#FFFFFF; margin-bottom:16px; line-height:1.3;
  }
  .hero-emotional-text{ max-width:62ch; line-height:1.75; font-size:1.02rem; color:#EDE6F7; }
  .hero-edit-btn{
    font-family:'Special Elite', monospace; font-size:0.75rem;
    background:rgba(255,255,255,0.15); color:#F5F1FB; border:1px solid rgba(255,255,255,0.4);
    padding:6px 14px; border-radius:999px; cursor:pointer; margin-top:14px; align-self:flex-start;
  }
  .hero-edit-btn:hover{ background:rgba(255,255,255,0.28); }

  /* RÂND LUNI (preview scroll) */
  .home-section{ margin-bottom:64px; }
  .months-scroll{
    display:flex; gap:18px; overflow-x:auto; padding:6px 2px 16px;
    scroll-snap-type:x mandatory;
  }
  .month-scroll-card{
    flex:0 0 170px; scroll-snap-align:start; text-decoration:none; color:inherit;
    transition:transform .2s;
  }
  .month-scroll-card:hover{ transform:translateY(-4px); }

  /* CARUSEL POEZII */
  .poem-carousel{ display:flex; align-items:center; gap:14px; }
  .carousel-track{
    display:flex; gap:20px; overflow-x:auto; scroll-behavior:smooth;
    padding:6px 2px 16px; flex:1;
  }
  .carousel-card{ flex:0 0 210px; }
  .carousel-btn{
    background:var(--accent); color:var(--paper); border:none;
    width:42px; height:42px; border-radius:50%; font-size:1.3rem; cursor:pointer;
    flex-shrink:0; transition:background .2s;
  }
  .carousel-btn:hover{ background:var(--accent-deep); }

  /* PIXEL WELCOME GATE — acum acoperă tot ecranul */
  #pixelGateWrap{
    position:fixed; inset:0; z-index:200;
    display:flex; align-items:center; justify-content:center;
  }
  .pixel-gate{
    width:100%; height:100%;
    background: linear-gradient(160deg, #2A1F45 0%, #3B2E6B 55%, #4E3A8C 100%);
    border:none;
    box-shadow:none;
    border-radius:0;
    padding:40px 30px;
    text-align:center;
    position:relative;
    overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    image-rendering:pixelated;
  }
  .pixel-gate::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, transparent 3px, transparent 6px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, transparent 3px, transparent 6px);
    pointer-events:none;
  }
  .pixel-hearts{
    font-family:'Press Start 2P', monospace;
    font-size:2.4rem;
    letter-spacing:14px;
    color:#E8A6D0;
    margin-bottom:26px;
    animation: pixelBlink 1.6s steps(2) infinite;
  }
  @keyframes pixelBlink{ 0%,100%{opacity:1;} 50%{opacity:0.55;} }
  .pixel-title{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(2.2rem, 6vw, 4.2rem);
    color:#F5F1FB;
    text-shadow: 4px 4px 0 var(--accent-deep);
    margin-bottom:28px;
    line-height:1.6;
  }
  .pixel-flower{
    display:inline-block; vertical-align:middle; font-size:0.75em;
    position:relative; top:-0.05em;
  }
  .pixel-question{
    font-family:'Press Start 2P', monospace;
    font-size:0.72rem;
    color:#E4D9F5;
    line-height:2;
    max-width:38ch;
    margin:0 auto 34px;
  }
  .pixel-btn-row{
    position:relative;
    display:flex; justify-content:center; gap:24px;
    height:70px;
  }
  .pixel-btn{
    font-family:'Press Start 2P', monospace;
    font-size:0.85rem;
    padding:16px 28px;
    background:#D9D2E8;
    color:#2A1F45;
    border:none;
    border-top:3px solid #FFFFFF;
    border-left:3px solid #FFFFFF;
    border-right:3px solid #6B5A94;
    border-bottom:3px solid #6B5A94;
    cursor:pointer;
    transition: transform .15s, left .18s ease, top .18s ease;
  }
  .pixel-btn:active{ transform:translateY(2px); }
  #pixelNo{ position:relative; }
  .pixel-gate-sub{
    margin-top:26px; font-family:'Special Elite', monospace; font-size:0.72rem; color:#C9B8EA;
  }

  h2.section-title{font-size:1.8rem; color:var(--accent-deep); margin-bottom:6px;}
  .section-sub{font-family:'Special Elite', monospace; font-size:0.85rem; color:var(--accent); margin-bottom:26px;}
  .back-link{
    display:inline-block; margin-bottom:20px; font-family:'Special Elite', monospace;
    font-size:0.82rem; color:var(--accent-deep); text-decoration:none; cursor:pointer;
  }
  .back-link:hover{text-decoration:underline;}

 .card-grid{display:grid; grid-template-columns:repeat(auto-fill, 210px); justify-content:start; gap:26px;}
  .card{
    background:var(--paper); border:1px solid var(--lilac-line);
    box-shadow:0 10px 24px var(--cream-shadow); padding:16px; border-radius:4px;
    transition:transform .25s; cursor:pointer; text-decoration:none; color:inherit; display:block;
  }
  .card:hover{transform:translateY(-5px) rotate(-0.5deg);}
  .photo-slot{
    width:100%; aspect-ratio:4/5; border:2px dashed var(--lilac-line);
    background:var(--paper-dark); display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--accent); font-size:0.78rem; text-align:center; gap:8px; padding:10px;
    border-radius:3px; background-size:cover; background-position:center;
  }
  .photo-slot.small{aspect-ratio:1;}
  .photo-slot span.icon{font-size:1.6rem;}
  .card-label{font-family:'Special Elite', monospace; color:var(--accent-deep); font-size:0.95rem; margin-top:12px;}
  .card-caption{font-size:0.85rem; color:var(--ink); opacity:0.8; margin-top:4px; font-style:italic;}

  .poem-photo{width:100%; max-width:320px; border-radius:6px; border:1px solid var(--lilac-line); margin-bottom:20px;}
.poem-text{
    font-family:'Playfair Display', serif; font-size:0.95rem; line-height:1.9; white-space:pre-line;
    background-color:var(--paper); background-size:cover; background-position:center;
    border:1px solid var(--lilac-line); border-radius:6px; padding:30px;
    box-shadow:0 10px 24px var(--cream-shadow); font-style:italic; color:var(--ink);
  }
  .photo-gallery{display:grid; grid-template-columns:repeat(auto-fill, 150px); justify-content:start; gap:16px; margin-top:10px;}
  .gallery-item{background:var(--paper); border:1px solid var(--lilac-line); border-radius:8px; padding:8px; box-shadow:0 8px 18px var(--cream-shadow); width:150px;}

  .upload-photo-form{
    margin-top:26px; display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    background:var(--paper); border:1px dashed var(--lilac-line); border-radius:6px; padding:18px;
  }
  .upload-photo-form input[type="text"]{
    flex:1; min-width:180px; font-family:'Poppins', sans-serif; border:1.5px solid var(--lilac-line);
    border-radius:6px; padding:10px; font-size:0.9rem; background:var(--paper-dark);
  }
  .upload-photo-form input[type="file"]{ font-family:'Poppins', sans-serif; font-size:0.85rem; }
  .upload-photo-form button{
    font-family:'Special Elite', monospace; background:var(--accent); color:var(--paper);
    border:none; padding:10px 22px; border-radius:999px; cursor:pointer;
  }
  .upload-photo-form button:hover{ background:var(--accent-deep); }
.upload-status{ width:100%; font-size:0.82rem; color:var(--accent-deep); font-style:italic; }

  .lightbox{
    display:none; position:fixed; inset:0; z-index:300;
    background:rgba(20,14,35,0.92);
    align-items:center; justify-content:center; padding:30px;
  }
  .lightbox.show{ display:flex; }
  .lightbox img{
    max-width:90vw; max-height:90vh; border-radius:8px;
    box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  .lightbox-close{
    position:absolute; top:24px; right:28px; background:none; border:none;
    color:#F5F1FB; font-size:1.6rem; cursor:pointer;
  }
  .photo-slot{ cursor:pointer; }

  .comments-box{margin-top:30px;}
  .comment-list{display:flex; flex-direction:column; gap:12px; margin-bottom:18px;}
  .comment-item{
    background:var(--paper-dark); border-left:3px solid var(--accent); border-radius:4px;
    padding:12px 16px; font-size:0.92rem;
  }
 .comment-item .c-meta{font-family:'Special Elite', monospace; font-size:0.72rem; color:var(--accent-deep); margin-bottom:4px;}
  .delete-btn{
    display:block; margin-top:8px; font-family:'Special Elite', monospace; font-size:0.72rem;
    background:none; border:none; color:#B0517A; cursor:pointer; padding:0; opacity:0.7;
  }
  .delete-btn:hover{ opacity:1; text-decoration:underline; }
  .comment-form textarea, .comment-form input{
    width:100%; font-family:'Poppins', sans-serif; border:1.5px solid var(--lilac-line);
    border-radius:6px; padding:10px; font-size:0.9rem; margin-bottom:10px; background:var(--paper);
  }
  .comment-form button{
    font-family:'Special Elite', monospace; background:var(--accent); color:var(--paper);
    border:none; padding:10px 24px; border-radius:999px; cursor:pointer;
  }
  .comment-form button:hover{background:var(--accent-deep);}
  .empty-note{font-size:0.85rem; opacity:0.6; font-style:italic;}

  .games-grid{display:grid; gap:34px;}
  .game-card{background:var(--paper); border:1px solid var(--lilac-line); box-shadow:0 12px 26px var(--cream-shadow); border-radius:6px; padding:28px;}
  .game-title{font-size:1.35rem; color:var(--ink); margin-bottom:4px;}
  .game-sub{font-family:'Special Elite', monospace; font-size:0.78rem; color:var(--accent); margin-bottom:18px;}

  .countdown-numbers{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:10px 0 22px;}
  .countdown-unit{
    display:flex; flex-direction:column; align-items:center;
    background:var(--paper-dark); border-radius:8px; padding:12px 16px; min-width:64px;
  }
  .countdown-unit span{ font-family:'Special Elite', monospace; font-size:1.6rem; color:var(--accent-deep); }
  .countdown-unit label{ font-size:0.68rem; color:var(--ink); opacity:0.7; margin-top:2px; text-transform:uppercase; letter-spacing:1px; }

  .flight-route{ display:flex; align-items:center; gap:10px; margin:6px 0 14px; }
  .flight-city{ font-family:'Special Elite', monospace; font-size:0.7rem; color:var(--accent-deep); white-space:nowrap; }
  .flight-track{
    position:relative; flex:1; height:2px;
    background-image:repeating-linear-gradient(90deg, var(--lilac-line) 0 6px, transparent 6px 12px);
  }
  .flight-progress{ position:absolute; left:0; top:0; height:2px; background:var(--accent); width:0%; transition:width 1s linear; }
  .flight-plane{ position:absolute; top:-11px; left:0%; transform:translateX(-50%); font-size:1.15rem; transition:left 1s linear; }

  .distance-note{ text-align:center; font-family:'Special Elite', monospace; font-size:0.78rem; color:var(--accent); margin-bottom:14px; }
  .countdown-map{ height:60vh; min-height:340px; border-radius:8px; overflow:hidden; border:1px solid var(--lilac-line); }
  .countdown-edit-form{ display:flex; flex-direction:column; gap:10px; margin-top:14px; }
  .countdown-edit-form label{ font-size:0.8rem; color:var(--ink); }
  .countdown-edit-form input[type="date"]{
    font-family:'Poppins', sans-serif; border:1.5px solid var(--lilac-line); border-radius:6px;
    padding:8px; font-size:0.9rem; background:var(--paper-dark);
  }

  .puzzle-setup-form{ display:flex; flex-direction:column; gap:12px; }
  .puzzle-setup-form input[type="text"]{
    font-family:'Poppins', sans-serif; border:1.5px solid var(--lilac-line); border-radius:6px;
    padding:10px; font-size:0.9rem; background:var(--paper-dark);
  }
  .puzzle-size-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .puzzle-board{
    display:grid; gap:2px; background:var(--lilac-line); border-radius:8px; overflow:hidden;
    aspect-ratio:1; max-width:380px; margin:0 auto;
  }
  .puzzle-piece{ background-color:var(--paper-dark); cursor:pointer; transition:filter .15s, outline .1s; }
  .puzzle-piece.selected{ outline:3px solid var(--accent); outline-offset:-3px; filter:brightness(1.08); }
  .puzzle-solved-message{
    text-align:center; margin-top:18px; padding:22px; background:var(--paper-dark); border-radius:8px;
    font-family:'Playfair Display', serif; font-style:italic; font-size:1.05rem; color:var(--accent-deep);
    animation:stampIn .4s ease;
  }
  .puzzle-actions{ display:flex; gap:10px; justify-content:center; margin-top:16px; flex-wrap:wrap; }

  .moon-widget{ display:flex; align-items:center; gap:20px; justify-content:center; padding:14px 0 6px; }
  .moon-emoji{ font-size:4rem; line-height:1; }
  .moon-info{ text-align:left; }
  .moon-phase-name{ font-family:'Playfair Display', serif; font-style:italic; font-size:1.2rem; color:var(--accent-deep); }
  .moon-illumination{ font-family:'Special Elite', monospace; font-size:0.78rem; color:var(--accent); margin-top:4px; }

  .draw-canvas{
    width:100%; aspect-ratio:4/3; background:#fff; border-radius:8px;
    border:1px solid var(--lilac-line); touch-action:none; cursor:crosshair; display:block;
  }
  .draw-toolbar{ display:flex; gap:12px; align-items:center; margin-top:12px; flex-wrap:wrap; }
  .draw-toolbar input[type="color"]{ width:40px; height:32px; border:none; border-radius:6px; cursor:pointer; padding:0; }
  .draw-toolbar input[type="range"]{ flex:1; min-width:100px; }
  .draw-toolbar label{ font-size:0.78rem; color:var(--ink); opacity:0.75; }
  .draw-palette{ display:flex; gap:6px; flex-wrap:wrap; }
  .draw-swatch{ width:26px; height:26px; border-radius:50%; cursor:pointer; box-shadow:0 0 0 1px var(--lilac-line); }
  .draw-swatch.active{ box-shadow:0 0 0 3px var(--accent-deep); }

  .memory-grid{display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; max-width:420px; margin:0 auto;}
  .mem-card{aspect-ratio:1; perspective:600px; cursor:pointer;}
  .mem-inner{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d;}
  .mem-card.flip .mem-inner{transform:rotateY(180deg);}
  .mem-face{position:absolute; inset:0; backface-visibility:hidden; display:flex; align-items:center; justify-content:center; border-radius:6px; font-size:1.5rem;}
  .mem-front{background:var(--ink); color:var(--gold);}
  .mem-back{background:var(--paper-dark); border:1px solid var(--lilac-line); transform:rotateY(180deg);}
  .mem-card.matched .mem-back{background:#e6dcf3; border-color:var(--accent);}
  .mem-status{text-align:center; margin-top:14px; font-family:'Special Elite', monospace; color:var(--accent-deep); min-height:1.2em;}

  .wheel-wrap{display:flex; flex-direction:column; align-items:center; gap:18px;}
  .wheel-frame{position:relative; width:260px; height:260px;}

function haversineDistance(a, b){
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI/180;
  const dLng = (b.lng - a.lng) * Math.PI/180;
  const lat1 = a.lat * Math.PI/180, lat2 = b.lat * Math.PI/180;
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return Math.round(2 * R * Math.asin(Math.sqrt(h)));
}

  } else if(parts[0] === 'poezii'){
    renderNav('poezii');
    view.innerHTML = viewPoezii();
    initPoeziiList();
  } else if(parts[0] === 'jocuri' && parts[1]){
    renderNav('jocuri');
    view.innerHTML = viewGameDetail(parts[1]);
    initGameById(parts[1]);
  } else if(parts[0] === 'jocuri'){
    renderNav('jocuri');
    view.innerHTML = viewJocuriMenu();
  } else {
    renderNav('');
    view.innerHTML = viewAcasa();
    initAcasaGate();
  }
}

// Navigare robustă: interceptăm clicurile pe linkurile interne (#/...)
// ca să funcționeze corect chiar dacă mediul de previzualizare
// nu declanșează implicit "hashchange".
document.addEventListener('click', function(e){
  const a = e.target.closest('a[href^="#/"], a[href="#/"]');
  if(!a) return;
  e.preventDefault();
  const targetHash = a.getAttribute('href');
  if(location.hash === targetHash){
    router();
  } else {
    location.hash = targetHash;
  }
});

function initAcasaGate(){
  const gateWrap = document.getElementById('pixelGateWrap');
  const content = document.getElementById('acasaContent');
  const yesBtn = document.getElementById('pixelYes');
  const noBtn = document.getElementById('pixelNo');
  if(!yesBtn) return;

  let dodgeCount = 0;
  const noMessages = [
    'heeei, ce faci?!?!?!?!',
    'degeaba incerci ;)))',
    'iibituleeee, nu e voie, caca'
  ];
  noBtn.addEventListener('mouseenter', ()=>{
    dodgeCount++;
    const btnW = noBtn.offsetWidth;
    const btnH = noBtn.offsetHeight;
    const margin = 20;
    const maxX = window.innerWidth - btnW - margin*2;
    const maxY = window.innerHeight - btnH - margin*2;
    const randX = margin + Math.floor(Math.random()*maxX);
    const randY = margin + Math.floor(Math.random()*maxY);
    noBtn.style.position = 'fixed';
    noBtn.style.left = randX+'px';
    noBtn.style.top = randY+'px';
    noBtn.style.zIndex = '210';

    if(dodgeCount === 3){ noBtn.textContent = noMessages[0]; noBtn.style.fontSize = '0.65rem'; }
    else if(dodgeCount === 6){ noBtn.textContent = noMessages[1]; noBtn.style.fontSize = '0.65rem'; }
    else if(dodgeCount >= 9){ noBtn.textContent = noMessages[2]; noBtn.style.fontSize = '0.6rem'; }
  });

  yesBtn.addEventListener('click', ()=>{
    gateWrap.style.transition = 'opacity .4s';
    gateWrap.style.opacity = '0';
    setTimeout(()=>{
      gateWrap.style.display = 'none';
      content.style.display = 'block';
      initHomeContent();
    }, 400);
  });
}

async function initCapsule(){
  const contentDiv = document.getElementById('capsuleContent');
  if(!contentDiv) return;

  async function renderView(){
    const capsule = await loadCapsule();
    if(!capsule){
      renderSetup();
      return;
    }
    const now = new Date();
    const unlock = new Date(capsule.unlockDate);
    if(now < unlock){
      const diffDays = Math.ceil((unlock - now) / (1000*60*60*24));
      contentDiv.innerHTML = `
        <div class="capsule-locked">
          <div class="capsule-icon">🔒</div>
          <p>O scrisoare așteaptă, sigilată.</p>
          <div class="capsule-date">Se deschide pe ${unlock.toLocaleDateString('ro-RO')} — ${diffDays} zile rămase</div>
        </div>
        <div class="puzzle-actions">
          <button class="hero-edit-btn" id="capsuleEditBtn" style="background:var(--paper-dark); color:var(--ink);">✏️ editează</button>
          <button class="hero-edit-btn" id="capsuleDeleteBtn" style="background:var(--paper-dark); color:var(--ink);">🗑️ șterge</button>
        </div>`;
      document.getElementById('capsuleEditBtn').addEventListener('click', ()=> renderSetup(capsule));
      document.getElementById('capsuleDeleteBtn').addEventListener('click', async ()=>{
        if(!confirm('Sigur vrei să ștergi capsula?')) return;
        await deleteCapsule();
        renderView();
      });
    } else {
      contentDiv.innerHTML = `
        <div class="capsule-open">🔓 ${capsule.message}</div>
        <div class="puzzle-actions">
          <button class="hero-edit-btn" id="capsuleResetBtn" style="background:var(--paper-dark); color:var(--ink);">✏️ scrie o capsulă nouă</button>
          <button class="hero-edit-btn" id="capsuleDeleteBtn" style="background:var(--paper-dark); color:var(--ink);">🗑️ șterge</button>
        </div>`;
      document.getElementById('capsuleResetBtn').addEventListener('click', ()=> renderSetup());
      document.getElementById('capsuleDeleteBtn').addEventListener('click', async ()=>{
        if(!confirm('Sigur vrei să ștergi capsula?')) return;
        await deleteCapsule();
        renderView();
      });
    }
  }

  function renderSetup(existing){
    contentDiv.innerHTML = `
      <form class="puzzle-setup-form" id="capsuleForm">
        <span class="empty-note">Scrie un mesaj care rămâne sigilat până la o dată aleasă de tine</span>
        <textarea id="capsuleMessage" rows="4" placeholder="Scrie mesajul aici..." required
          style="font-family:'Poppins', sans-serif; border:1.5px solid var(--lilac-line); border-radius:6px; padding:10px; font-size:0.9rem; background:var(--paper-dark);">${existing ? existing.message : ''}</textarea>
        <input type="date" id="capsuleDate" required value="${existing ? existing.unlockDate : ''}" style="font-family:'Poppins', sans-serif; border:1.5px solid var(--lilac-line); border-radius:6px; padding:8px; background:var(--paper-dark);">
        <div style="display:flex; gap:10px;">
          <button type="submit" class="hero-edit-btn" style="background:var(--accent); color:var(--paper); border:none;">${existing ? 'Salvează modificările' : 'Sigilează capsula'}</button>
          ${existing ? '<button type="button" id="capsuleCancelBtn" class="hero-edit-btn" style="background:var(--paper-dark); color:var(--ink);">Renunță</button>' : ''}
        </div>
        <div class="upload-status" id="capsuleStatus"></div>
      </form>`;
    if(existing){
      document.getElementById('capsuleCancelBtn').addEventListener('click', renderView);
    }
    document.getElementById('capsuleForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const message = document.getElementById('capsuleMessage').value.trim();
      const unlockDate = document.getElementById('capsuleDate').value;
      const statusEl = document.getElementById('capsuleStatus');
      if(!message || !unlockDate) return;
      statusEl.textContent = 'Se salvează...';
      try{
        await saveCapsule({ message, unlockDate });
        renderView();
      }catch(err){
        statusEl.textContent = 'Eroare: ' + err.message;
      }
    });
  }

  renderView();
}

async function trackVisitStreak(){
  if(window._streakTracked) return;
  window._streakTracked = true;
  try{
    const todayKey = getTodayKey();
    const streak = await loadStreak();
    if(!streak){
      await saveStreak({ lastDate: todayKey, current: 1, longest: 1 });
      return;
    }
    if(streak.lastDate === todayKey) return;
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yKey = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
    const newCurrent = streak.lastDate === yKey ? (streak.current || 0) + 1 : 1;
    const newLongest = Math.max(newCurrent, streak.longest || 0);
    await saveStreak({ lastDate: todayKey, current: newCurrent, longest: newLongest });
  }catch(e){}
}

async function initTravelMap(){
  const contentDiv = document.getElementById('travelMapContent');

  setTimeout(()=> map.invalidateSize(), 200);

  const markers = {};
  async function loadAndRenderSpots(){
    const spots = await loadTravelSpots();
    Object.values(markers).forEach(m=>map.removeLayer(m));
    const listDiv = document.getElementById('travelSpotsList');
    listDiv.innerHTML = spots.length ? spots.map(s=>`
      <div class="journal-entry">

      </div>`).join('') : '<p class="empty-note">Niciun loc adăugat încă.</p>';
    listDiv.querySelectorAll('[data-edit]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const newName = prompt('Numele locului:', btn.dataset.name);
        if(!newName) return;
        const newNote = prompt('Notița:', btn.dataset.note) || '';
        await editTravelSpot(btn.dataset.edit, newName.trim(), newNote.trim());
        loadAndRenderSpots();
      });
    });
    listDiv.querySelectorAll('.delete-btn[data-id]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        await deleteTravelSpot(btn.dataset.id);
        loadAndRenderSpots();
      });
    });
    spots.forEach(s=>{
      const m = L.marker([s.lat, s.lng]).addTo(map).bindPopup(`<strong>${s.name}</strong><br>${s.note||''}`);
      markers[s.id] = m;
    });
  }

  map.on('click', async (e)=>{
    const name = prompt('Numele locului:');
    if(!name) return;
    const note = prompt('O mică notiță (opțional):') || '';
    await addTravelSpot({ lat:e.latlng.lat, lng:e.latlng.lng, name, note });
    loadAndRenderSpots();
  });

  loadAndRenderSpots();
}

function initMoon(){
  const emojiEl = document.getElementById('moonEmoji');
  if(!emojiEl) return;
  const now = new Date();
  const knownNewMoon = new Date('2000-01-06T18:14:00Z').getTime();
  const synodicMonth = 29.53058867;
  const diffDays = (now.getTime() - knownNewMoon) / 86400000;
  const phase = ((diffDays % synodicMonth) + synodicMonth) % synodicMonth;
  const illumination = Math.round((1 - Math.cos(2 * Math.PI * phase / synodicMonth)) / 2 * 100);

  let emoji, name;
  if(phase < 1.84566){ emoji='🌑'; name='Lună nouă'; }
  else if(phase < 5.53699){ emoji='🌒'; name='Semilună crescătoare'; }
  else if(phase < 9.22831){ emoji='🌓'; name='Primul pătrar'; }
  else if(phase < 12.91963){ emoji='🌔'; name='Gibboasă crescătoare'; }
  else if(phase < 16.61096){ emoji='🌕'; name='Lună plină'; }
  else if(phase < 20.30228){ emoji='🌖'; name='Gibboasă descrescătoare'; }
  else if(phase < 23.99361){ emoji='🌗'; name='Ultimul pătrar'; }
  else if(phase < 27.68493){ emoji='🌘'; name='Semilună descrescătoare'; }
  else { emoji='🌑'; name='Lună nouă'; }

  emojiEl.textContent = emoji;
  document.getElementById('moonPhaseName').textContent = name;
  document.getElementById('moonIllumination').textContent = `${illumination}% iluminată`;
}

async function initCountdown(){
  const contentDiv = document.getElementById('countdownContent');
  if(!contentDiv) return;

  if(window._countdownInterval){ clearInterval(window._countdownInterval); }

  async function renderView(){
    const stored = await loadCountdown();
    const cd = { ...DEFAULT_COUNTDOWN, ...(stored || {}) };

    contentDiv.innerHTML = `
      <div class="countdown-numbers">
        <div class="countdown-unit"><span id="cdDays">--</span><label>zile</label></div>
        <div class="countdown-unit"><span id="cdHours">--</span><label>ore</label></div>
        <div class="countdown-unit"><span id="cdMinutes">--</span><label>min</label></div>
        <div class="countdown-unit"><span id="cdSeconds">--</span><label>sec</label></div>
      </div>
      <div class="flight-route">
        <span class="flight-city">New York</span>
        <div class="flight-track">
          <div class="flight-progress" id="flightProgress"></div>
          <div class="flight-plane" id="flightPlane">✈️</div>
        </div>
        <span class="flight-city">Cluj-Napoca</span>
      </div>
      <div class="distance-note" id="distanceNote"></div>
      <div class="countdown-map" id="countdownMap"></div>
      <button class="hero-edit-btn" id="editCountdownBtn" style="background:var(--accent); color:var(--paper); border:none; margin-top:14px;">✏️ editează datele</button>
    `;

    const distance = haversineDistance(CLUJ_COORDS, NY_COORDS);
    document.getElementById('distanceNote').textContent = `📏 ${distance.toLocaleString('ro-RO')} km distanță în linie dreaptă`;

    function updateNumbers(){
      const now = new Date();
      const target = new Date(cd.reunionDate);
      let diff = target - now;
      if(diff < 0) diff = 0;
      const days = Math.floor(diff/(1000*60*60*24));
      const hours = Math.floor((diff/(1000*60*60))%24);
      const minutes = Math.floor((diff/(1000*60))%60);
      const seconds = Math.floor((diff/1000)%60);
      const dEl = document.getElementById('cdDays');
      if(!dEl) return;
      dEl.textContent = days;
      document.getElementById('cdHours').textContent = String(hours).padStart(2,'0');
      document.getElementById('cdMinutes').textContent = String(minutes).padStart(2,'0');
      document.getElementById('cdSeconds').textContent = String(seconds).padStart(2,'0');

      const start = new Date(cd.startDate).getTime();
      const end = new Date(cd.reunionDate).getTime();
      let progress = end > start ? (now.getTime() - start) / (end - start) : 0;
      progress = Math.max(0, Math.min(1, progress));
      const progressEl = document.getElementById('flightProgress');
      const planeEl = document.getElementById('flightPlane');
      if(progressEl) progressEl.style.width = (progress*100)+'%';
      if(planeEl) planeEl.style.left = (progress*100)+'%';
    }
    updateNumbers();
    window._countdownInterval = setInterval(updateNumbers, 1000);

    const mapEl = document.getElementById('countdownMap');
    const map = L.map(mapEl, { scrollWheelZoom:false }).setView([44, -20], 3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);
    L.marker([CLUJ_COORDS.lat, CLUJ_COORDS.lng]).addTo(map).bindPopup('Cluj-Napoca 💜');
    L.marker([NY_COORDS.lat, NY_COORDS.lng]).addTo(map).bindPopup('New York ✈️');
    L.polyline(
      [[CLUJ_COORDS.lat, CLUJ_COORDS.lng],[NY_COORDS.lat, NY_COORDS.lng]],
      { color:'#7C5CBF', dashArray:'6,8', weight:2 }
    ).addTo(map);
    setTimeout(()=> map.invalidateSize(), 200);

    document.getElementById('editCountdownBtn').addEventListener('click', ()=> renderEdit(cd));
  }

  function renderEdit(cd){
    if(window._countdownInterval){ clearInterval(window._countdownInterval); }
    contentDiv.innerHTML = `
      <form class="countdown-edit-form" id="countdownEditForm">
        <label>De când numărăm (ex: ziua plecării)</label>
        <input type="date" id="cdStartInput" value="${cd.startDate}">
        <label>Data revederii</label>
        <input type="date" id="cdEndInput" value="${cd.reunionDate}">
        <div style="display:flex; gap:10px; margin-top:6px;">
          <button type="submit" class="hero-edit-btn" style="background:var(--accent); color:var(--paper); border:none;">Salvează</button>
          <button type="button" id="cancelCountdownEdit" class="hero-edit-btn" style="background:var(--paper-dark); color:var(--ink);">Renunță</button>
        </div>
        <div class="upload-status" id="countdownEditStatus"></div>
      </form>
    `;
    document.getElementById('cancelCountdownEdit').addEventListener('click', renderView);
    document.getElementById('countdownEditForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const startDate = document.getElementById('cdStartInput').value;
      const reunionDate = document.getElementById('cdEndInput').value;
      const statusEl = document.getElementById('countdownEditStatus');
      if(!startDate || !reunionDate) return;
      statusEl.textContent = 'Se salvează...';
      try{
        await saveCountdown({ startDate, reunionDate });
        renderView();
      }catch(err){
        statusEl.textContent = 'Eroare: ' + err.message;
      }
    });
  }

  renderView();
}

async function initPuzzle(){
  const contentDiv = document.getElementById('puzzleContent');
  if(!contentDiv) return;

  async function renderSetup(existing){
    contentDiv.innerHTML = `
      <form class="puzzle-setup-form" id="puzzleSetupForm">
        <input type="file" id="puzzlePhotoInput" accept="image/*" ${existing && existing.photo ? '' : 'required'}>
        <span class="empty-note">${existing && existing.photo ? 'Lasă gol ca să păstrezi poza actuală' : 'Alege o poză de-a voastră'}</span>
        <div class="puzzle-size-row" id="puzzleSizeRow">
          <button type="button" class="delete-btn" data-size="3" style="border:1.5px solid var(--lilac-line); border-radius:999px; padding:8px 16px; color:var(--ink); opacity:1;">Ușor (3×3)</button>
          <button type="button" class="delete-btn" data-size="4" style="border:1.5px solid var(--lilac-line); border-radius:999px; padding:8px 16px; color:var(--ink); opacity:1;">Mediu (4×4)</button>
          <button type="button" class="delete-btn" data-size="5" style="border:1.5px solid var(--lilac-line); border-radius:999px; padding:8px 16px; color:var(--ink); opacity:1;">Greu (5×5)</button>
        </div>
        <input type="text" id="puzzleMessageInput" placeholder="Mesajul ascuns sub piese" value="${existing ? (existing.message||'').replace(/"/g,'&quot;') : ''}" required>
        <button type="submit" class="hero-edit-btn" style="background:var(--accent); color:var(--paper); border:none; align-self:flex-start;">Creează puzzle-ul</button>
        <div class="upload-status" id="puzzleSetupStatus"></div>
      </form>
    `;
    let selectedSize = existing ? existing.gridSize : 4;
    const sizeRow = document.getElementById('puzzleSizeRow');
    function markSelected(){
      sizeRow.querySelectorAll('button').forEach(b=>{
        const isSel = Number(b.dataset.size) === selectedSize;
        b.style.background = isSel ? 'var(--accent)' : 'none';
        b.style.color = isSel ? 'var(--paper)' : 'var(--ink)';
      });
    }
    markSelected();
    sizeRow.querySelectorAll('button').forEach(b=>{
      b.addEventListener('click', ()=>{ selectedSize = Number(b.dataset.size); markSelected(); });
    });

    document.getElementById('puzzleSetupForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fileInput = document.getElementById('puzzlePhotoInput');
      const message = document.getElementById('puzzleMessageInput').value.trim();
      const statusEl = document.getElementById('puzzleSetupStatus');
      if(!message) return;
      statusEl.textContent = 'Se salvează...';
      try{
        let photoUrl = existing ? existing.photo : '';
        if(fileInput.files[0]){
          photoUrl = await uploadPhotoToImgBB(fileInput.files[0]);
        }
        if(!photoUrl){ statusEl.textContent = 'Alege o poză.'; return; }
        const config = { photo: photoUrl, gridSize: selectedSize, message };
        await savePuzzle(config);
        renderBoard(config);
      }catch(err){
        statusEl.textContent = 'Eroare: ' + err.message;
      }
    });
  }

  function renderBoard(config){
    const n = config.gridSize;
    let order = Array.from({length:n*n}, (_,i)=>i);
    // amestecăm până nu mai e rezolvat din start
    do{
      for(let i=order.length-1; i>0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [order[i], order[j]] = [order[j], order[i]];
      }
    } while(order.every((v,i)=>v===i));

    contentDiv.innerHTML = `
      <div class="puzzle-board" id="puzzleBoard" style="grid-template-columns:repeat(${n}, 1fr);"></div>
      <div class="puzzle-actions">
        <button class="hero-edit-btn" id="puzzleShuffleBtn" style="background:var(--accent); color:var(--paper); border:none;">🔀 amestecă din nou</button>
        <button class="hero-edit-btn" id="puzzleChangeBtn" style="background:var(--paper-dark); color:var(--ink);">✏️ schimbă poza</button>
      </div>
      <div id="puzzleWin"></div>
    `;

    const board = document.getElementById('puzzleBoard');
    let selectedEl = null;

    function pieceStyle(pieceIndex){
      const col = pieceIndex % n;
      const row = Math.floor(pieceIndex / n);
      const denom = n - 1 || 1;
      return `background-image:url('${config.photo}'); background-size:${n*100}% ${n*100}%; background-position:${(col/denom)*100}% ${(row/denom)*100}%;`;
    }

    order.forEach(pieceIndex=>{
      const cell = document.createElement('div');
      cell.className = 'puzzle-piece';
      cell.dataset.pieceIndex = pieceIndex;
      cell.style.cssText = pieceStyle(pieceIndex);
      cell.addEventListener('click', ()=>{
        if(!selectedEl){
          selectedEl = cell;
          cell.classList.add('selected');
          return;
        }
        if(selectedEl === cell){
          cell.classList.remove('selected');
          selectedEl = null;
          return;
        }
        const tempIndex = selectedEl.dataset.pieceIndex;
        const tempStyle = selectedEl.style.cssText;
        selectedEl.dataset.pieceIndex = cell.dataset.pieceIndex;
        selectedEl.style.cssText = cell.style.cssText;
        cell.dataset.pieceIndex = tempIndex;
        cell.style.cssText = tempStyle;
        selectedEl.classList.remove('selected');
        selectedEl = null;
        checkWin();
      });
      board.appendChild(cell);
    });

    function checkWin(){
      const pieces = Array.from(board.children);
      const solved = pieces.every((cell, i)=> Number(cell.dataset.pieceIndex) === i);
      if(solved){
        document.getElementById('puzzleWin').innerHTML = `
          <div class="puzzle-solved-message">💜 ${config.message}</div>
        `;
      }
    }

    document.getElementById('puzzleShuffleBtn').addEventListener('click', ()=> renderBoard(config));
    document.getElementById('puzzleChangeBtn').addEventListener('click', ()=> renderSetup(config));
  }

  const existing = await loadPuzzle();
  if(existing && existing.photo){
    renderBoard(existing);
  } else {
    renderSetup(existing);
  }
}

function initDrawing(){
  const canvas = document.getElementById('drawCanvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const colorInput = document.getElementById('drawColor');
  const widthInput = document.getElementById('drawWidth');
  const clearBtn = document.getElementById('drawClearBtn');
  const eraserBtn = document.getElementById('drawEraserBtn');
  const undoBtn = document.getElementById('drawUndoBtn');
  const saveBtn = document.getElementById('drawSaveBtn');
  const paletteEl = document.getElementById('drawPalette');

  const palette = ['#7C5CBF','#5B3E96','#C0463A','#E8A6D0','#D8B4E2','#3F7873','#2B374F','#D1A24E','#000000','#FFFFFF'];
  paletteEl.innerHTML = palette.map(c=>`<div class="draw-swatch" data-color="${c}" style="background:${c};"></div>`).join('');
  let eraserOn = false;

  function setActiveSwatch(color){
    paletteEl.querySelectorAll('.draw-swatch').forEach(s=>{
      s.classList.toggle('active', s.dataset.color.toLowerCase() === color.toLowerCase());
    });
  }
  paletteEl.querySelectorAll('.draw-swatch').forEach(sw=>{
    sw.addEventListener('click', ()=>{
      eraserOn = false;
      eraserBtn.style.background = 'var(--paper-dark)';
      eraserBtn.style.color = 'var(--ink)';
      colorInput.value = sw.dataset.color;
      setActiveSwatch(sw.dataset.color);
    });
  });
  colorInput.addEventListener('input', ()=>{
    eraserOn = false;
    eraserBtn.style.background = 'var(--paper-dark)';
    eraserBtn.style.color = 'var(--ink)';
    setActiveSwatch(colorInput.value);
  });

  eraserBtn.addEventListener('click', ()=>{
    eraserOn = !eraserOn;
    eraserBtn.style.background = eraserOn ? 'var(--accent)' : 'var(--paper-dark)';
    eraserBtn.style.color = eraserOn ? 'var(--paper)' : 'var(--ink)';
  });

  let allStrokes = [];
  let currentStroke = null;
  let drawing = false;

  function drawStroke(stroke){
    if(!stroke.points || stroke.points.length < 1) return;
    ctx.save();
    if(stroke.color === 'eraser'){
      ctx.globalCompositeOperation = 'destination-out';
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = stroke.color;
    }
    ctx.lineWidth = stroke.width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    stroke.points.forEach((p, i)=>{
      const x = p.x * canvas.width;
      const y = p.y * canvas.height;
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
    ctx.restore();
  }

  function redrawAll(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    allStrokes.forEach(drawStroke);
    if(currentStroke) drawStroke(currentStroke);
  }

  function resizeCanvas(){
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    redrawAll();
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  if(window._drawingUnsub){ window._drawingUnsub(); }
  window._drawingUnsub = db.collection('site').doc('drawing').onSnapshot(doc=>{
    allStrokes = doc.exists ? (doc.data().strokes || []) : [];
    redrawAll();
  });

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX-rect.left)/rect.width, y: (clientY-rect.top)/rect.height };
  }
  function startDraw(e){
    e.preventDefault();
    drawing = true;
    currentStroke = {
      points:[getPos(e)],
      color: eraserOn ? 'eraser' : colorInput.value,
      width: Number(widthInput.value) * (eraserOn ? 2.2 : 1)
    };
  }
  function moveDraw(e){
    if(!drawing) return;
    e.preventDefault();
    currentStroke.points.push(getPos(e));
    redrawAll();
  }
  async function endDraw(){
    if(!drawing) return;
    drawing = false;
    if(currentStroke && currentStroke.points.length > 1){
      allStrokes = [...allStrokes, currentStroke];
      try{
        await db.collection('site').doc('drawing').set({ strokes: allStrokes });
      }catch(e){}
    }
    currentStroke = null;
  }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', moveDraw);
  window.addEventListener('mouseup', endDraw);
  canvas.addEventListener('touchstart', startDraw);
  canvas.addEventListener('touchmove', moveDraw);
  canvas.addEventListener('touchend', endDraw);

  undoBtn.addEventListener('click', async ()=>{
    if(!allStrokes.length) return;
    const reduced = allStrokes.slice(0, -1);
    try{ await db.collection('site').doc('drawing').set({ strokes: reduced }); }catch(e){}
  });

  clearBtn.addEventListener('click', async ()=>{
    if(!confirm('Sigur vreți să ștergeți tabla, pentru amândoi?')) return;
    await db.collection('site').doc('drawing').set({ strokes: [] });
  });

  saveBtn.addEventListener('click', async ()=>{
    const tmp = document.createElement('canvas');
    tmp.width = canvas.width; tmp.height = canvas.height;
    const tctx = tmp.getContext('2d');
    tctx.fillStyle = '#ffffff';
    tctx.fillRect(0,0,tmp.width,tmp.height);
    tctx.drawImage(canvas, 0, 0);
    const dataURL = tmp.toDataURL('image/png');

    const link = document.createElement('a');
    link.download = 'desenul-nostru.png';
    link.href = dataURL;
    link.click();

    try{
      const url = await uploadDataURLToImgBB(dataURL);
      await saveDrawingToGallery(url);
    }catch(e){}
  });
}

async function initMemory(){
  const contentDiv = document.getElementById('memoryContent');
  if(!contentDiv) return;

  async function renderSetup(existingPhotos){
    contentDiv.innerHTML = `
      <form class="puzzle-setup-form" id="memorySetupForm">
        <input type="file" id="memoryPhotosInput" accept="image/*" multiple ${existingPhotos && existingPhotos.length ? '' : 'required'}>
        <span class="empty-note">${existingPhotos && existingPhotos.length ? 'Lasă gol ca să păstrezi pozele actuale, sau alege poze noi (2-8)' : 'Alege 2-8 poze de-ale voastre'}</span>
        <button type="submit" class="hero-edit-btn" style="background:var(--accent); color:var(--paper); border:none; align-self:flex-start;">Creează jocul</button>
        <div class="upload-status" id="memorySetupStatus"></div>
      </form>
    `;
    document.getElementById('memorySetupForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fileInput = document.getElementById('memoryPhotosInput');
      const statusEl = document.getElementById('memorySetupStatus');
      statusEl.textContent = 'Se încarcă pozele...';
      try{
        let photos = existingPhotos || [];
        if(fileInput.files.length){
          const files = Array.from(fileInput.files).slice(0,8);
          if(files.length < 2){ statusEl.textContent = 'Alege cel puțin 2 poze.'; return; }
          photos = [];
          for(const file of files){
            const url = await uploadPhotoToImgBB(file);
            photos.push(url);
          }
        }
        if(!photos.length){ statusEl.textContent = 'Alege poze.'; return; }
        await saveMemoryPhotos(photos);
        renderGame(photos);
      }catch(err){
        statusEl.textContent = 'Eroare: ' + err.message;
      }
    });
  }

  function renderGame(photos){
    contentDiv.innerHTML = `
      <div class="memory-grid" id="memoryGrid"></div>
      <div class="mem-status" id="memStatus"></div>
      <div class="puzzle-actions">
        <button class="hero-edit-btn" id="memoryShuffleBtn" style="background:var(--accent); color:var(--paper); border:none;">🔀 amestecă din nou</button>
        <button class="hero-edit-btn" id="memoryChangeBtn" style="background:var(--paper-dark); color:var(--ink);">✏️ schimbă pozele</button>
      </div>
    `;
    let cards = [...photos, ...photos];
    cards.sort(()=>Math.random()-0.5);
    const memoryGrid = document.getElementById('memoryGrid');
    const memStatus = document.getElementById('memStatus');
    let flippedCards = [], lockBoard = false, matchesFound = 0;

    cards.forEach(photoUrl=>{
      const card = document.createElement('div');
      card.className = 'mem-card';
      card.innerHTML = `<div class="mem-inner"><div class="mem-face mem-front"></div><div class="mem-face mem-back" style="background-image:url('${photoUrl}'); background-size:cover; background-position:center;"></div></div>`;
      card.dataset.photo = photoUrl;
      card.addEventListener('click', ()=>flipCard(card));
      memoryGrid.appendChild(card);
    });
    function flipCard(card){
      if(lockBoard || card.classList.contains('flip') || card.classList.contains('matched')) return;
      card.classList.add('flip');
      flippedCards.push(card);
      if(flippedCards.length === 2){
        lockBoard = true;
        const [a,b] = flippedCards;
        if(a.dataset.photo === b.dataset.photo){
          a.classList.add('matched'); b.classList.add('matched');
          matchesFound++; flippedCards = []; lockBoard = false;
          if(matchesFound === photos.length) memStatus.textContent = 'Ai găsit toate perechile! Exact ca noi doi 💜';
        } else {
          setTimeout(()=>{ a.classList.remove('flip'); b.classList.remove('flip'); flippedCards = []; lockBoard = false; }, 800);
        }
      }
    }
    document.getElementById('memoryShuffleBtn').addEventListener('click', ()=> renderGame(photos));
    document.getElementById('memoryChangeBtn').addEventListener('click', ()=> renderSetup(photos));
  }

  const existing = await loadMemoryPhotos();
  if(existing && existing.length){
    renderGame(existing);
  } else {
    renderSetup(existing);
  }
}

async function initWheel(){
  const contentDiv = document.getElementById('wheelContent');
  if(!contentDiv) return;

  function buildWheel(wheelOptions){
    const wheelColors = ['#7C5CBF','#5B3E96','#C9A0D8','#8B6BB5','#B99BD8','#4E3A73','#E8A6D0','#3F7873','#D1A24E','#C0463A'];
    const wheelSvg = document.getElementById('wheelSvg');
    const segAngle = 360 / wheelOptions.length;
    function polarToCartesian(cx, cy, r, angleDeg){ const a=(angleDeg-90)*Math.PI/180; return {x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)}; }
    function describeArc(cx, cy, r, startAngle, endAngle){
      const start = polarToCartesian(cx,cy,r,endAngle), end = polarToCartesian(cx,cy,r,startAngle);
      const largeArcFlag = endAngle-startAngle<=180?"0":"1";
      return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArcFlag} 0 ${end.x} ${end.y} Z`;
    }
    wheelOptions.forEach((opt,i)=>{
      const start=i*segAngle, end=start+segAngle;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', describeArc(100,100,98,start,end));
      path.setAttribute('fill', wheelColors[i%wheelColors.length]);
      wheelSvg.appendChild(path);
      const mid=start+segAngle/2, labelPos=polarToCartesian(100,100,62,mid);
      const text=document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x',labelPos.x); text.setAttribute('y',labelPos.y);
      text.setAttribute('fill','#F5F1FB'); text.setAttribute('font-size','7');
      text.setAttribute('font-family','Poppins, sans-serif'); text.setAttribute('text-anchor','middle');
      text.setAttribute('transform', `rotate(${mid}, ${labelPos.x}, ${labelPos.y})`);
      const words=opt.split(' '); let line='', lines=[];
      words.forEach(w=>{ if((line+w).length>14){lines.push(line); line=w+' ';} else line+=w+' '; });
      lines.push(line);
      lines.forEach((l,idx)=>{
        const tspan=document.createElementNS('http://www.w3.org/2000/svg','tspan');
        tspan.setAttribute('x', labelPos.x); tspan.setAttribute('dy', idx===0?0:8);
        tspan.textContent=l.trim(); text.appendChild(tspan);
      });
      wheelSvg.appendChild(text);
    });
    let currentRotation=0;
    document.getElementById('spinBtn').addEventListener('click', ()=>{
      const winnerIndex=Math.floor(Math.random()*wheelOptions.length);
      const targetMid=winnerIndex*segAngle+segAngle/2;
      const spins=5*360;
      const finalRotation=currentRotation+spins+(360-targetMid)-(currentRotation%360);
      currentRotation=finalRotation;
      document.getElementById('wheelSvg').style.transform=`rotate(${finalRotation}deg)`;
      document.getElementById('wheelResult').textContent='';
      setTimeout(()=>{ document.getElementById('wheelResult').textContent='→ '+wheelOptions[winnerIndex]; }, 3600);
    });
  }

  function renderView(options){
    contentDiv.innerHTML = `
      <div class="wheel-wrap">
        <div class="wheel-frame">
          <div class="wheel-pointer"></div>
          <svg class="wheel" id="wheelSvg" viewBox="0 0 200 200"></svg>
        </div>
        <button class="spin-btn" id="spinBtn">Învârte roata</button>
        <div class="wheel-result" id="wheelResult"></div>
        <button class="hero-edit-btn" id="editWheelBtn" style="background:var(--paper-dark); color:var(--ink);">✏️ editează opțiunile</button>
      </div>
    `;
    buildWheel(options);
    document.getElementById('editWheelBtn').addEventListener('click', ()=> renderEdit(options));
  }

  function renderEdit(options){
    contentDiv.innerHTML = `
      <form class="puzzle-setup-form" id="wheelEditForm">
        <span class="empty-note">Scrie o opțiune pe fiecare rând (minim 2, maxim 10)</span>
        <textarea id="wheelOptionsInput" rows="8" style="font-family:'Poppins', sans-serif; border:1.5px solid var(--lilac-line); border-radius:6px; padding:10px; font-size:0.9rem; background:var(--paper-dark);">${options.join('\n')}</textarea>
        <div style="display:flex; gap:10px;">
          <button type="submit" class="hero-edit-btn" style="background:var(--accent); color:var(--paper); border:none;">Salvează</button>
          <button type="button" id="cancelWheelEdit" class="hero-edit-btn" style="background:var(--paper-dark); color:var(--ink);">Renunță</button>
        </div>
        <div class="upload-status" id="wheelEditStatus"></div>
      </form>
    `;
    document.getElementById('cancelWheelEdit').addEventListener('click', ()=> renderView(options));
    document.getElementById('wheelEditForm').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const lines = document.getElementById('wheelOptionsInput').value.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,10);
      const statusEl = document.getElementById('wheelEditStatus');
      if(lines.length < 2){ statusEl.textContent = 'Scrie cel puțin 2 opțiuni.'; return; }
      try{
        await saveWheelOptions(lines);
        renderView(lines);
      }catch(err){
        statusEl.textContent = 'Eroare: ' + err.message;
      }
    });
  }

  const stored = await loadWheelOptions();
  renderView(stored && stored.length ? stored : DEFAULT_WHEEL_OPTIONS);
}

function initGames(){
  initCountdown();
  initMoon();
  initPuzzle();
  initDrawing();
  initMemory();
  initWheel();
}

/* ============ LIGHTBOX ============ */
document.getElementById('lightboxClose').addEventListener('click', ()=>{
  document.getElementById('lightbox').classList.remove('show');
});
document.getElementById('lightbox').addEventListener('click', (e)=>{
  if(e.target.id === 'lightbox') document.getElementById('lightbox').classList.remove('show');
});

/* ============ MUSIC TOGGLE ============ */
const musicBtn = document.getElementById('musicToggle');
const bgAudio = document.getElementById('bgAudio');
let playing = false;
musicBtn.addEventListener('click', ()=>{
  if(!playing){
    bgAudio.play().catch(()=>{});
    musicBtn.classList.add('playing');
    musicBtn.textContent = '🔊';
    playing = true;
  } else {
    bgAudio.pause();
    musicBtn.classList.remove('playing');
    musicBtn.textContent = '🎵';
    playing = false;
  }
});
</script>
